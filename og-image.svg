<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0L0 0 0 44" fill="none" stroke="rgba(255,107,0,0.07)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowL" cx="25%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="60%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Grid texture -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#ff6b00"/>

  <!-- Left: Claw icon (large, decorative) -->
  <g transform="translate(72, 188) scale(5.2)" opacity="0.9">
    <path d="M11 22C11 22 9 20 9 17C9 14 11 12 13 12V8C13 6.3 14 5 15.5 5C17 5 18 6.3 18 8V11.2C18.8 10.4 20 10.5 20.8 11.3C21.6 12.1 21.5 13.5 20.8 14.2V12C20.8 11.2 21.2 10.6 22 10.6C22.8 10.6 23.2 11.2 23.2 12V15.5C24 14.8 24.5 14.8 25 15.3C25.5 15.8 25.3 17 24.8 17.8L23 22C22.5 24.2 20.5 26 18.2 26H14.8C12.5 26 11 24.2 11 22Z" fill="#ff6b00"/>
    <path d="M15.5 5C14.3 5.5 13 7 13 8L14.5 7C14.5 6 15 5.2 15.5 5Z" fill="#ff9f40"/>
    <path d="M18 8C18 6.5 18.8 5.4 20 5C19 6 18 7 18 8Z" fill="#ff9f40"/>
    <path d="M23.2 12C23.5 10.3 24.5 9.2 25.5 9C25 10.2 24 11.2 23.2 12Z" fill="#ff9f40"/>
  </g>

  <!-- Vertical divider -->
  <line x1="300" y1="80" x2="300" y2="550" stroke="rgba(255,107,0,0.15)" stroke-width="1"/>

  <!-- Right content area -->

  <!-- Badge pill -->
  <rect x="340" y="140" width="310" height="36" rx="18" fill="rgba(255,107,0,0.12)" stroke="rgba(255,107,0,0.35)" stroke-width="1"/>
  <circle cx="365" cy="158" r="5" fill="#ff6b00"/>
  <text x="382" y="163" font-family="'Courier New',monospace" font-size="14" fill="#ff6b00" letter-spacing="1">Open Source · ESP32-S3</text>

  <!-- FlipperClaw wordmark -->
  <text x="340" y="270" font-family="'Courier New',monospace" font-size="86" font-weight="bold" fill="#f0f0f0" letter-spacing="-2">Flipper</text>
  <text x="340" y="360" font-family="'Courier New',monospace" font-size="86" font-weight="bold" letter-spacing="-2">
    <tspan fill="#ff6b00">Claw</tspan>
  </text>

  <!-- Orange glow under "Claw" -->
  <ellipse cx="430" cy="370" rx="130" ry="18" fill="#ff6b00" opacity="0.15"/>

  <!-- Tagline -->
  <text x="340" y="420" font-family="'Courier New',monospace" font-size="22" fill="#888888" letter-spacing="0.3">An open-source AI agent you can hold in your hand.</text>

  <!-- Separator line -->
  <line x1="340" y1="458" x2="860" y2="458" stroke="rgba(255,107,0,0.2)" stroke-width="1"/>

  <!-- Feature pills row -->
  <!-- Pill 1: Streaming Responses -->
  <rect x="340" y="476" width="190" height="32" rx="6" fill="#111118" stroke="#2a2a3e" stroke-width="1"/>
  <text x="360" y="497" font-family="'Courier New',monospace" font-size="13" fill="#888">⚡  Streaming LLM</text>

  <!-- Pill 2: ReAct Agent -->
  <rect x="544" y="476" width="160" height="32" rx="6" fill="#111118" stroke="#2a2a3e" stroke-width="1"/>
  <text x="564" y="497" font-family="'Courier New',monospace" font-size="13" fill="#888">🔄  ReAct Agent</text>

  <!-- Pill 3: Hardware Control -->
  <rect x="718" y="476" width="188" height="32" rx="6" fill="#111118" stroke="#2a2a3e" stroke-width="1"/>
  <text x="738" y="497" font-family="'Courier New',monospace" font-size="13" fill="#888">📡  Hardware Control</text>

  <!-- Right side: terminal card -->
  <rect x="920" y="100" width="240" height="200" rx="10" fill="#0c0c14" stroke="#2a2a3e" stroke-width="1"/>
  <!-- Terminal titlebar -->
  <rect x="920" y="100" width="240" height="32" rx="10" fill="#161622"/>
  <rect x="920" y="120" width="240" height="12" fill="#161622"/>
  <circle cx="944" cy="116" r="5" fill="#ff5f57"/>
  <circle cx="960" cy="116" r="5" fill="#febc2e"/>
  <circle cx="976" cy="116" r="5" fill="#28c840"/>
  <!-- Terminal content -->
  <text x="934" y="158" font-family="'Courier New',monospace" font-size="11" fill="#ff6b00">FlipperClaw v1.0</text>
  <text x="934" y="175" font-family="'Courier New',monospace" font-size="10" fill="#444466">[claude-haiku-4-5]</text>
  <text x="934" y="200" font-family="'Courier New',monospace" font-size="10" fill="#00d4ff">&gt; Scan NFC tag</text>
  <text x="934" y="216" font-family="'Courier New',monospace" font-size="10" fill="#555577">→ flipper_nfc_read</text>
  <text x="934" y="232" font-family="'Courier New',monospace" font-size="10" fill="#444466">← MIFARE Classic 1K</text>
  <text x="934" y="256" font-family="'Courier New',monospace" font-size="10" fill="#ddddee">Hotel keycard. UID</text>
  <text x="934" y="271" font-family="'Courier New',monospace" font-size="10" fill="#ddddee">04:A3:2B:C1</text>
  <!-- Cursor -->
  <rect x="934" y="281" width="7" height="9" fill="#00d4ff" opacity="0.8"/>

  <!-- GitHub URL bottom right -->
  <text x="920" y="540" font-family="'Courier New',monospace" font-size="14" fill="#444455">github.com/yasher3413/flipperclaw</text>

  <!-- Wiring dots decorative bottom left -->
  <g opacity="0.3">
    <line x1="72" y1="500" x2="200" y2="500" stroke="#ff6b00" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="72"  cy="500" r="4" fill="#ff6b00"/>
    <circle cx="200" cy="500" r="4" fill="#00d4ff"/>
    <text x="72" y="525" font-family="'Courier New',monospace" font-size="11" fill="#555566">TX ── RX  GND  5V</text>
  </g>
</svg>
